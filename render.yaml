# BudgetPilot360 — Blueprint Render (backend FastAPI).
# Déploiement : Render Dashboard > New > Blueprint, pointer sur ce dépôt.
# Les valeurs `sync: false` sont des SECRETS à saisir dans le dashboard Render
# (jamais commitées) — utiliser les clés du projet Supabase de PRODUCTION.

services:
  - type: web
    name: budgetpilot360-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free # offre gratuite : le service s'endort après ~15 min d'inactivité (réveil ~1 min)
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false # https://<ref-prod>.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # backend uniquement — jamais côté frontend
      - key: SUPABASE_JWT_SECRET
        value: "" # legacy HS256 — vide si le projet signe en ES256 (défaut)
      - key: DATABASE_URL
        sync: false # pooler Supabase prod (inutilisé par les endpoints actuels)
      - key: MISTRAL_API_KEY
        sync: false
      - key: MISTRAL_MODEL
        value: mistral-small-latest
      - key: WEASYPRINT_DLL_DIRECTORIES
        value: "" # vide sous Linux : les libs Pango sont dans l'image Docker
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false # ex : https://budgetpilot360.vercel.app (CORS restreint)
